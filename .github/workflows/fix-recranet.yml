name: Fix Recranet CSS Integration

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
  workflow_dispatch:

jobs:
  fix-recranet:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Create Recranet CSS fix file
        run: |
          mkdir -p src/styles
          cat > src/styles/recranet-fix.css << 'CSSEOF'
          /* Prevent Tailwind from affecting Recranet */
          .recranet-isolated-section,
          .recranet-isolated-section *,
          recranet-accommodations,
          recranet-accommodations * {
            all: revert;
            box-sizing: border-box;
          }
          
          recranet-accommodations {
            display: block !important;
            width: 100% !important;
            overflow: visible !important;
          }
          CSSEOF
          echo "✅ CSS file created"
      
      - name: Add CSS import to main.tsx
        run: |
          if ! grep -q "recranet-fix.css" src/main.tsx; then
            sed -i "1i import './styles/recranet-fix.css';" src/main.tsx
            echo "✅ CSS import added to main.tsx"
          else
            echo "ℹ️  CSS import already exists"
          fi
      
      - name: Build project
        run: npm run build
        continue-on-error: true
      
      - name: Configure git
        run: |
          git config --local user.email "claude-bot@anthropic.com"
          git config --local user.name "Claude Auto-Fix Bot"
      
      - name: Commit and push changes
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "🎨 Auto-fix: Recranet CSS isolation"
            git push origin main
            echo "✅ Changes pushed to GitHub"
          else
            echo "ℹ️  No changes to commit"
          fi
