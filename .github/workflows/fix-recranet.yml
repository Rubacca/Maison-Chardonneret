name: Fix Recranet CSS Integration

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
  workflow_dispatch:

jobs:
  fix-recranet:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check for Recranet CSS issues
        run: |
          if [ ! -f "src/styles/recranet-fix.css" ]; then
            echo "Creating Recranet CSS fix file..."
            mkdir -p src/styles
            cat > src/styles/recranet-fix.css << 'EOF'
          /* Prevent Tailwind from affecting Recranet */
          .recranet-isolated-section,
          .recranet-isolated-section *,
          recranet-accommodations,
          recranet-accommodations * {
            all: revert;
            box-sizing: border-box;
          }
          
          recranet-accommodations {
            display: block !important;
            width: 100% !important;
            overflow: visible !important;
          }
          EOF
          fi
      
      - name: Check main.tsx imports
        run: |
          if ! grep -q "recranet-fix.css" src/main.tsx; then
            echo "Adding CSS import to main.tsx..."
            sed -i "1i import './styles/recranet-fix.css'" src/main.tsx
          fi
      
      - name: Build to verify no errors
        run: npm run build || true
      
      - name: Commit fixes
        run: |
          git config user.email "claude-bot@anthropic.com"
          git config user.name "Claude Bot"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "🎨 Auto-fix: Recranet CSS isolation"
            git push
          fi
